name: minehost-project

services:
  mysql:
    image: mysql/mysql-server:8.0
    container_name: mysql
    networks:
      - minehost-network
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  minehost:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: minehost
    # En root pour pouvoir lire /var/run/docker.sock (cf. commentaire dans backend/Dockerfile).
    user: "0:0"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - minehost-network
    # IMPORTANT : on ne réserve PLUS la plage 25565-25600 sur l'hôte ici.
    # Chaque container "monde" créé par DockerService publie son propre port hôte
    # (via Docker API), donc cette plage doit rester DISPONIBLE sur l'hôte.
    # Seul le port REST 8080 est exposé pour le backend.
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}

      NGROK_TOKEN: ${NGROK_TOKEN}
      DEBIAN_FRONTEND: noninteractive
      # Chemin des mondes vu côté HÔTE — c'est cette valeur que le backend envoie
      # au daemon Docker quand il crée les bind-mounts des containers "monde".
      # On le rend identique au chemin vu côté backend (mount 1:1 ci-dessous),
      # ce qui simplifie énormément WorldService (un seul "basePath").
      APP_WORLDS_HOST_BASE_PATH: ${WORLDS_HOST_PATH}
    volumes:
      # Mount 1:1 : /home/fuentesr/mondes/ sur l'hôte ↔ même chemin dans le container.
      # Ainsi, quand le backend écrit /home/fuentesr/mondes/user_1/myworld, ce chemin
      # existe au même endroit sur l'hôte, donc le daemon Docker peut le bind-mounter
      # dans le container "monde".
      - ${WORLDS_HOST_PATH}:${WORLDS_HOST_PATH}
      # Socket Docker : permet au backend (via docker-java) de créer les containers monde.
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  minehost-network:
    driver: bridge

volumes:
  mysql_data:
