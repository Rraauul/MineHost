<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MineHost - Create World</title>
    <link rel="stylesheet" href="../styles/dashboard.css" />
    <link rel="stylesheet" href="../styles/create-world.css" />
    <link rel="icon" href="Images/favicon.png" />
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="logo">
        <i class="icon">@</i>
        <span>MineHost</span>
      </div>

      <a href="dashboard.html" class="menu-item">
        <i class="icon">⊞</i>
        <span>DashBoard</span>
      </a>

      <a href="create-world.html" class="menu-item active">
        <i class="icon">⧉</i>
        <span>Create World</span>
      </a>

      <a href="my-worlds.html" class="menu-item">
        <i class="icon">☁</i>
        <span>My Worlds</span>
      </a>

      <div class="spacer"></div>

      <div class="bottom-menu">
        <a href="#" class="menu-item">
          <i class="icon">?</i>
          <span>Help</span>
        </a>

        <a href="contact.html" class="menu-item">
          <i class="icon">✉</i>
          <span>Contact us</span>
        </a>

        <a href="#" class="menu-item" id="logout-btn">
          <i class="icon">↪</i>
          <span>Log out</span>
        </a>
      </div>
    </div>

    <!-- Toggle sidebar button -->
    <div class="toggle-sidebar" id="toggle-sidebar">
      <span>◀</span>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <div class="header">
        <div class="header-left">
          <h1>Create a New World</h1>
        </div>

        <div class="user-profile">
          <img src="../Images/userLogo.png" alt="Profile Photo" />
          <span id="username-display">Loading...</span>
        </div>
      </div>

      <div class="create-world-container">
        <div class="create-world-form">
          <h2>My New World</h2>

          <div class="form-group">
            <label for="world-name">Name</label>
            <input
              type="text"
              id="world-name"
              placeholder="Enter world name"
              class="form-control"
            />
          </div>

          <div class="form-group">
            <label for="world-template">Template</label>
            <div class="select-wrapper">
              <select id="world-template" class="form-control">
                <option value="">Loading templates...</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="ram-input">RAM (GB)</label>
            <input
              type="number"
              id="ram-input"
              min="1"
              max="16"
              value="4"
              class="form-control"
            />
            <small>Enter the amount of RAM in gigabytes (1-16)</small>
          </div>

          <div class="form-group">
            <label for="server-id">Server ID</label>
            <input
              type="number"
              id="server-id"
              min="1"
              value="1"
              class="form-control"
            />
            <small>Enter the server ID where to host this world</small>
          </div>

          <div class="form-actions">
            <button id="create-world-btn" class="btn-create">Create</button>
          </div>

          <div id="status-message" class="status-message"></div>
        </div>
      </div>
    </div>

    <script src="../js/service/httpService.js" type="module"></script>
    <script src="../js/controller/AuthGuard.js" type="module"></script>
    <script src="../js/controller/create-world.js" type="module"></script>
  </body>
</html>
