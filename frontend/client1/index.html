<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MineHost - Connexion</title>
    <link rel="stylesheet" href="styles/dashboard.css" />
    <link rel="stylesheet" href="styles/login.css" />
    <link rel="icon" href="Images/favicon.png">
 
  </head>
  <body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="logo">
          <i class="icon">@</i>
          <span>MineHost</span>
        </div>
  
        <a href="index.html" class="menu-item">
          <i class="icon">⊞</i>
          <span>DashBord</span>
        </a>
  
        <a href="index.html" class="menu-item">
          <i class="icon">⧉</i>
          <span>Create Wolrd</span>
        </a>
  
        <a href="index.html" class="menu-item">
          <i class="icon">☁</i>
          <span>My Worlds</span>
        </a>
  
        <div class="spacer"></div>
  
        <div class="bottom-menu">
          <a href="#" class="menu-item">
            <i class="icon">?</i>
            <span>Help</span>
          </a>
  
          <a href="views/contact.html" class="menu-item">
            <i class="icon">✉</i>
            <span>Contact us</span>
          </a>
  
          <a href="#" class="menu-item" id="logout-btn">
            <i class="icon">↪</i>
            <span>Log out</span>
          </a>
        </div>
      </div>

      <div class="main-content">
        <div class="login-container">
          <h1>Connexion à MineHost</h1>
          <p>Connectez-vous pour accéder à vos serveurs Minecraft</p>

          <form id="loginForm" class="login-form" method="POST">
            <div class="form-group">
              <label for="username">Nom d'utilisateur</label>
              <input type="text" id="username" name="username" required />
            </div>

            <div class="form-group">
              <label for="password">Mot de passe</label>
              <input type="password" id="password" name="password" required />
            </div>

            <div class="form-options">
              <div class="remember-me">
                <input type="checkbox" id="remember" name="remember" />
                <label for="remember">Se souvenir de moi</label>
              </div>
              <a href="#" class="forgot-password">Mot de passe oublié?</a>
            </div>

            <button type="submit" class="login-btn">Se connecter</button>

            <div id="login-message" class="login-message"></div>
          </form>

          <div class="register-link">
            <p>Vous n'avez pas de compte? <a href="#">Inscrivez-vous</a></p>
          </div>
        </div>
      </div>
    </div>
    
    <script src="js/service/httpService.js" type="module"></script>
    <script src="js/controller/login.js" type="module"></script>
    <script src="js/controller/AuthGuard.js" type="module"></script>
    
  </body>
</html>
