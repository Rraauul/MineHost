<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion - MineHost</title>
    <link rel="stylesheet" href="styles/styles.css" />
    <link rel="stylesheet" href="styles/login.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="javascripts/serviceHttp.js"></script>
    <link rel="icon" href="images/logo.png">

</head>

<body>
    <header>
        <div class="header-container">
            <a href="accueil.html" class="logo-button">
                <img src="images/logo.png" alt="Logo MineHost" class="logo">
            </a>
    
            <nav class="menu-nav">
                <button class="nav-btn" onclick="location.href='offres.html'">nos offres</button>
                <button class="nav-btn" onclick="location.href='support.html'">assistance</button>
                <button class="nav-btn" onclick="location.href='tuto.html'">tutoriel</button>
            </nav>
    
            <div class="user-panel">
                <div class="user-info-row">
                    <a href="login.html" id="avatar-link">
                        <img id="avatar" src="images/usernc.png" alt="Avatar">
                    </a>
                    <span id="user-name">non connecté</span>
                    <img src="images/emeraude.png" alt="Emeraude" width="20">
                    <span id="emerald-count">0</span>
                    <a href="clientParam.html">
                        <button class="recharge-btn">recharger</button>
                    </a>
                </div>
                <p class="offre-text">Offre : <span id="abonnement-info">Aucune</span></p>
            </div>
        </div>
    </header>


    <main>
        <div class="login-form">
            <h2>Connexion</h2>
            <label for="user">Nom d'utilisateur</label>
            <input type="text" id="username">
            <label for="password">Mot de passe</label>
            <input type="password" id="password">
            <div>
                <texte id="motDepasseInfo"></texte>
            </div>
            <button onClick="loginInstance.testLogin()" type="submit" id="submit" value="Submit">Se connecter</button>
        </div>
    </main>
    <script src="javascripts/utils.js"></script>
    <script src="javascripts/login.js"></script>
</body>

</html>
